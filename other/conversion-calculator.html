<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversion Calculator</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="calculator-wrapper">
        <div class="calculator" style="width: 100%; max-width: 420px;">

            <div class="calc-view active">
                <div class="calc-header">
                    <h2>Conversion Calculator</h2>
                    <p>Convert units of length, weight, temp, and more</p>
                </div>
                
                <div class="form-box">
                    <div class="input-group">
                        <label>Category</label>
                        <select id="conv-category" class="custom-input">
                            <option value="length">Length</option>
                            <option value="weight">Weight / Mass</option>
                            <option value="temperature">Temperature</option>
                            <option value="volume">Volume</option>
                        </select>
                    </div>

                    <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 15px;">
                        <div class="input-group" style="flex: 1; margin: 0;">
                            <label>Value</label>
                            <input type="number" id="conv-input" class="custom-input" placeholder="0">
                        </div>
                        <div class="input-group" style="flex: 1; margin: 0;">
                            <label>From</label>
                            <select id="conv-from" class="custom-input"></select>
                        </div>
                    </div>

                    <div style="display: flex; justify-content: center; margin-bottom: 10px;">
                        <button id="swap-btn" class="nav-btn" style="width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--btn-bg); border: 1px solid var(--calc-border);"><i class="fas fa-exchange-alt" style="transform: rotate(90deg);"></i></button>
                    </div>

                    <div class="input-group" style="margin-bottom: 0;">
                        <label>To</label>
                        <select id="conv-to" class="custom-input"></select>
                    </div>

                </div>
                
                <div class="result-container" id="conv-result-container">
                    <div class="age-main" id="conv-main-result" style="font-size: 2rem; color: var(--calc-accent); margin-bottom: 0; overflow-wrap: break-word;">
                        0
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/script.js"></script>
    <script src="../js/conversion.js"></script>
</body>
</html>
