<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .checkbox-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            color: var(--text-primary);
        }
        .checkbox-group input {
            width: 20px;
            height: 20px;
            accent-color: var(--calc-accent);
        }
        .length-slider {
            width: 100%;
            margin: 15px 0;
            accent-color: var(--calc-accent);
        }
    </style>
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="calculator-wrapper">
        <div class="calculator">

            <div class="calc-view active">
                <div class="calc-header">
                    <h2>Password Generator</h2>
                    <p>Create secure, random passwords</p>
                </div>
                
                <div class="result-container" style="margin-top: 0; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between;">
                    <div id="password-display" style="font-size: 1.4rem; font-family: monospace; color: var(--calc-accent); word-break: break-all; text-align: left; flex: 1; padding-right: 10px;">Click generate</div>
                    <button id="copy-btn" class="nav-btn" style="flex: 0; background: var(--btn-bg);"><i class="fas fa-copy"></i></button>
                </div>
                
                <div class="form-box">
                    <div class="input-group">
                        <label style="display: flex; justify-content: space-between;">Password Length: <span id="length-val" style="color: var(--calc-accent); font-weight: bold;">16</span></label>
                        <input type="range" id="password-length" min="4" max="64" value="16" class="length-slider">
                    </div>
                    
                    <div class="checkbox-group">
                        <label for="inc-uppercase">Uppercase (A-Z)</label>
                        <input type="checkbox" id="inc-uppercase" checked>
                    </div>
                    <div class="checkbox-group">
                        <label for="inc-lowercase">Lowercase (a-z)</label>
                        <input type="checkbox" id="inc-lowercase" checked>
                    </div>
                    <div class="checkbox-group">
                        <label for="inc-numbers">Numbers (0-9)</label>
                        <input type="checkbox" id="inc-numbers" checked>
                    </div>
                    <div class="checkbox-group">
                        <label for="inc-symbols">Symbols (!@#$)</label>
                        <input type="checkbox" id="inc-symbols" checked>
                    </div>

                    <button id="generate-btn" class="action-btn" style="margin-top: 20px;">Generate Password</button>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/script.js"></script>
    <script src="../js/password.js"></script>
</body>
</html>
