<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Calculator</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="calculator-wrapper">
        <div class="calculator">

            <div id="grade-view" class="calc-view active">
                <div class="calc-header">
                    <h2>Final Grade Calculator</h2>
                    <p>Find out what you need on your final exam</p>
                </div>

                <div class="form-box">
                    <div class="input-group">
                        <label>Current Grade (%)</label>
                        <input type="number" id="grade-current" class="custom-input" placeholder="e.g. 85">
                    </div>

                    <div class="input-group">
                        <label>Target Grade (%)</label>
                        <input type="number" id="grade-target" class="custom-input" placeholder="e.g. 90">
                    </div>

                    <div class="input-group">
                        <label>Final Exam Weight (%)</label>
                        <input type="number" id="grade-weight" class="custom-input" placeholder="e.g. 20">
                    </div>

                    <button id="calc-grade-btn" class="action-btn">Calculate Needed Grade</button>
                </div>

                <div class="result-container" id="grade-result-container" style="display: none;">
                    <div class="age-main" id="grade-main-result" style="font-size: 2rem;">
                        Result
                    </div>
                    <div class="age-details" id="grade-details">
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/script.js"></script>
    <script src="../js/grade.js"></script>
</body>

</html>
