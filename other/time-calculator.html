<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Calculator</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="calculator-wrapper">
        <div class="calculator">

            <div id="time-view" class="calc-view active">
                <div class="calc-header">
                    <h2>Time Calculator</h2>
                    <p>Calculate differences or add/subtract time</p>
                </div>
                
                <div class="form-box">
                    <div class="input-group">
                        <label>Calculation Type</label>
                        <select id="time-calc-type" class="custom-input">
                            <option value="difference">Time between</option>
                            <option value="add_sub">Add/Subtract time</option>
                        </select>
                    </div>

                    <!-- Difference Mode -->
                    <div id="mode-difference">
                        <div class="input-group">
                            <label>Start Time</label>
                            <input type="time" id="time-start" class="custom-input" value="09:00">
                        </div>
                        <div class="input-group">
                            <label>End Time</label>
                            <input type="time" id="time-end" class="custom-input" value="17:00">
                        </div>
                    </div>

                    <!-- Add/Sub Mode -->
                    <div id="mode-add-sub" style="display: none;">
                        <div class="input-group">
                            <label>Start Time</label>
                            <input type="time" id="time-base" class="custom-input" value="12:00">
                        </div>
                        <div class="input-group" style="display: flex; gap: 10px;">
                            <select id="time-op" class="custom-input" style="flex: 1;">
                                <option value="add">Add (+)</option>
                                <option value="sub">Subtract (-)</option>
                            </select>
                        </div>
                        <div style="display: flex; gap: 10px;">
                            <div class="input-group" style="flex: 1;">
                                <label>Hours</label>
                                <input type="number" id="time-hours" class="custom-input" value="0" min="0">
                            </div>
                            <div class="input-group" style="flex: 1;">
                                <label>Minutes</label>
                                <input type="number" id="time-minutes" class="custom-input" value="0" min="0">
                            </div>
                        </div>
                    </div>
                    
                    <button id="calc-time-btn" class="action-btn">Calculate</button>
                </div>
                
                <div class="result-container" id="time-result-container" style="display: none;">
                    <div class="age-main" id="time-main-result" style="font-size: 1.5rem;">
                        Result will appear here
                    </div>
                    <div class="age-details" id="time-details">
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/script.js"></script>
    <script src="../js/time.js"></script>
</body>
</html>
