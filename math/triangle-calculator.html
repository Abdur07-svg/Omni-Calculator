<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triangle Calculator</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="calculator-wrapper">
        <div class="calculator" style="width: 100%; max-width: 420px;">
            <div class="calc-view active">
                <div class="calc-header">
                    <h2>Triangle Calculator</h2>
                    <p>Calculate area, perimeter, and angles</p>
                </div>
                
                <div class="form-box" style="padding-top: 30px;">
                    <div class="triangle-wrapper" style="position: relative; width: 300px; height: 260px; margin: 0 auto 30px auto;">
                        <!-- Triangle SVG -->
                        <svg width="200" height="173.2" viewBox="0 0 200 173.2" style="position: absolute; top: 40px; left: 50px; overflow: visible;">
                            <polygon points="100,0 200,173.2 0,173.2" fill="none" stroke="var(--text-primary)" stroke-width="4"/>
                            
                            <!-- Arcs -->
                            <path d="M 85 26 A 30 30 0 0 0 115 26" fill="none" stroke="var(--calc-accent)" stroke-width="1.5"/>
                            <path d="M 30 173.2 A 30 30 0 0 0 15 147.2" fill="none" stroke="var(--calc-accent)" stroke-width="1.5"/>
                            <path d="M 170 173.2 A 30 30 0 0 1 185 147.2" fill="none" stroke="var(--calc-accent)" stroke-width="1.5"/>
                            
                            <!-- Labels inside -->
                            <text x="100" y="45" fill="var(--calc-accent)" font-size="20" font-family="Outfit" text-anchor="middle">C</text>
                            <text x="30" y="155" fill="var(--calc-accent)" font-size="20" font-family="Outfit" text-anchor="middle">A</text>
                            <text x="170" y="155" fill="var(--calc-accent)" font-size="20" font-family="Outfit" text-anchor="middle">B</text>
                            
                            <!-- Side labels -->
                            <text x="65" y="95" fill="#22c55e" font-size="14" font-family="Outfit" font-weight="500" text-anchor="middle">side b</text>
                            <text x="135" y="95" fill="#22c55e" font-size="14" font-family="Outfit" font-weight="500" text-anchor="middle">side a</text>
                            <text x="100" y="162" fill="#22c55e" font-size="14" font-family="Outfit" font-weight="500" text-anchor="middle">side c</text>
                        </svg>

                        <!-- Angle C Input (Top) -->
                        <input type="number" id="tri-angle-c" class="custom-input" style="position: absolute; top: 0px; left: 120px; width: 60px; text-align: center; padding: 5px;" placeholder="&deg;">

                        <!-- Side B Input (Left) -->
                        <input type="number" id="tri-side-b" class="custom-input" style="position: absolute; top: 80px; left: 5px; width: 60px; text-align: center; padding: 5px;">

                        <!-- Side A Input (Right) -->
                        <input type="number" id="tri-side-a" class="custom-input" style="position: absolute; top: 80px; left: 235px; width: 60px; text-align: center; padding: 5px;">

                        <!-- Angle A Input (Bottom Left) -->
                        <input type="number" id="tri-angle-a" class="custom-input" style="position: absolute; top: 190px; left: 5px; width: 60px; text-align: center; padding: 5px;" placeholder="&deg;">

                        <!-- Angle B Input (Bottom Right) -->
                        <input type="number" id="tri-angle-b" class="custom-input" style="position: absolute; top: 190px; left: 235px; width: 60px; text-align: center; padding: 5px;" placeholder="&deg;">

                        <!-- Side C Input (Bottom Center) -->
                        <input type="number" id="tri-side-c" class="custom-input" style="position: absolute; top: 225px; left: 120px; width: 60px; text-align: center; padding: 5px;">
                    </div>

                    <div style="display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 20px;">
                        <label style="font-size: 1.1rem;">Angle Unit:</label>
                        <select id="angle-unit" class="custom-input" style="width: auto; padding: 10px;">
                            <option value="degree">degree &deg;</option>
                            <option value="radian">radian rad</option>
                        </select>
                    </div>

                    <button id="calc-tri-btn" class="action-btn">Calculate</button>
                </div>
                
                <div class="result-container" id="tri-result-container" style="display: none; padding: 15px;">
                    <div class="age-details" id="tri-details" style="text-align: left; padding: 0;">
                        <!-- Results injected here -->
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/script.js"></script>
    <script src="../js/triangle.js"></script>
</body>
</html>
