<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triangle Calculator</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="calculator-wrapper">
        <div class="calculator" style="width: 100%; max-width: 420px;">
            <div class="calc-view active">
                <div class="calc-header">
                    <h2>Triangle Calculator</h2>
                    <p>Calculate area, perimeter, and angles</p>
                </div>
                
                <div class="form-box">
                    <div class="input-group">
                        <label>Calculation Method</label>
                        <select id="tri-method" class="custom-input">
                            <option value="base-height">Base & Height</option>
                            <option value="3-sides">3 Sides</option>
                        </select>
                    </div>

                    <div id="inputs-base-height" style="display: flex; gap: 10px; margin-bottom: 15px;">
                        <div class="input-group" style="flex: 1; margin: 0;">
                            <label>Base</label>
                            <input type="number" id="tri-base" class="custom-input" placeholder="0">
                        </div>
                        <div class="input-group" style="flex: 1; margin: 0;">
                            <label>Height</label>
                            <input type="number" id="tri-height" class="custom-input" placeholder="0">
                        </div>
                    </div>

                    <div id="inputs-3-sides" style="display: none; gap: 10px; margin-bottom: 15px;">
                        <div class="input-group" style="flex: 1; margin: 0;">
                            <label>Side A</label>
                            <input type="number" id="tri-a" class="custom-input" placeholder="0">
                        </div>
                        <div class="input-group" style="flex: 1; margin: 0;">
                            <label>Side B</label>
                            <input type="number" id="tri-b" class="custom-input" placeholder="0">
                        </div>
                        <div class="input-group" style="flex: 1; margin: 0;">
                            <label>Side C</label>
                            <input type="number" id="tri-c" class="custom-input" placeholder="0">
                        </div>
                    </div>

                    <button id="calc-tri-btn" class="action-btn">Calculate</button>
                </div>
                
                <div class="result-container" id="tri-result-container" style="display: none; padding: 15px;">
                    <div class="age-details" id="tri-details" style="text-align: left; padding: 0;">
                        <!-- Results injected here -->
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/script.js"></script>
    <script src="../js/triangle.js"></script>
</body>
</html>
