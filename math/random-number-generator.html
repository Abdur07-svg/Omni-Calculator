<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Number Generator</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="calculator-wrapper">
        <div class="calculator" style="width: 100%; max-width: 420px;">

            <div class="calc-view active">
                <div class="calc-header">
                    <h2>Random Number Generator</h2>
                    <p>Generate secure random integers</p>
                </div>
                
                <div class="form-box">
                    <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 15px;">
                        <div class="input-group" style="flex: 1; margin: 0;">
                            <label>Min</label>
                            <input type="number" id="rand-min" placeholder="e.g. 1" class="custom-input">
                        </div>
                        <div class="input-group" style="flex: 1; margin: 0;">
                            <label>Max</label>
                            <input type="number" id="rand-max" placeholder="e.g. 100" class="custom-input">
                        </div>
                    </div>
                    
                    <div class="input-group" style="margin-bottom: 20px;">
                        <label>How Many?</label>
                        <input type="number" id="rand-count" placeholder="e.g. 1" class="custom-input" min="1" max="1000">
                    </div>

                    <button id="calc-rand-btn" class="action-btn">Generate</button>
                </div>
                
                <div class="result-container" id="rand-result-container" style="display: none; max-height: 250px; overflow-y: auto;">
                    <div class="age-main" id="rand-main-result" style="font-size: 2rem; color: var(--calc-accent); margin-bottom: 0; word-break: break-all;">
                        0
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/script.js"></script>
    <script src="../js/random.js"></script>
</body>
</html>
