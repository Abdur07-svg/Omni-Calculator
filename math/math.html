<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Calculator</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="calculator-wrapper">
        
        
        <div class="calculator">
            <!-- App Navigation -->

            <!-- Standard Calculator View -->
            <div id="standard-view" class="calc-view active">
            <div class="mode-toggle-container">
                <button id="scientific-toggle-btn" class="mode-toggle-btn">
                    <i class="fas fa-flask"></i> Scientific
                </button>
                <div class="angle-toggle" id="angle-toggle" style="display: none;">
                    <button class="angle-btn active" data-angle="deg">Deg</button>
                    <button class="angle-btn" data-angle="rad">Rad</button>
                </div>
            </div>
            <div class="display">
                <div class="previous-operand" id="previous-operand"></div>
                <div class="current-operand" id="current-operand">0</div>
            </div>
            <div class="keypad-wrapper">
                <!-- Scientific Keypad -->
                <div class="keypad scientific-keypad hidden" id="scientific-keypad">
                    <button class="btn btn-sci" data-sci="sin">sin</button>
                    <button class="btn btn-sci" data-sci="asin">sin⁻¹</button>
                    <button class="btn btn-sci" data-sci="x-pow-y">xʸ</button>
                    <button class="btn btn-sci" data-sci="y-root-x">ʸ√x</button>
                    <button class="btn btn-sci" data-sci="(">(</button>

                    <button class="btn btn-sci" data-sci="cos">cos</button>
                    <button class="btn btn-sci" data-sci="acos">cos⁻¹</button>
                    <button class="btn btn-sci" data-sci="x-pow-3">x³</button>
                    <button class="btn btn-sci" data-sci="cbrt">∛x</button>
                    <button class="btn btn-sci" data-sci=")">)</button>

                    <button class="btn btn-sci" data-sci="tan">tan</button>
                    <button class="btn btn-sci" data-sci="atan">tan⁻¹</button>
                    <button class="btn btn-sci" data-sci="x-pow-2">x²</button>
                    <button class="btn btn-sci" data-sci="sqrt">√x</button>
                    <button class="btn btn-sci" data-sci="1-over-x">1/x</button>

                    <button class="btn btn-sci" data-sci="pi">π</button>
                    <button class="btn btn-sci" data-sci="e">e</button>
                    <button class="btn btn-sci" data-sci="e-pow-x">eˣ</button>
                    <button class="btn btn-sci" data-sci="ln">ln</button>
                    <button class="btn btn-action" data-action="percent">%</button>

                    <button class="btn btn-sci" data-sci="10-pow-x">10ˣ</button>
                    <button class="btn btn-sci" data-sci="log">log</button>
                    <button class="btn btn-sci" data-sci="fact">n!</button>
                    <button class="btn btn-sci" data-sci="rnd">RND</button>
                    <button class="btn btn-sci" data-sci="exp">EXP</button>
                </div>

                <!-- Basic Keypad -->
                <div class="keypad basic-keypad" id="basic-keypad">
                    <button class="btn btn-number" data-number="7">7</button>
                    <button class="btn btn-number" data-number="8">8</button>
                    <button class="btn btn-number" data-number="9">9</button>
                    <button class="btn btn-operator" data-operator="+" data-action="append">+</button>
                    <button class="btn btn-action" data-action="delete"><i class="fas fa-backspace"></i></button>

                    <button class="btn btn-number" data-number="4">4</button>
                    <button class="btn btn-number" data-number="5">5</button>
                    <button class="btn btn-number" data-number="6">6</button>
                    <button class="btn btn-operator" data-operator="-" data-action="append">-</button>
                    <button class="btn btn-action" data-action="ans">Ans</button>

                    <button class="btn btn-number" data-number="1">1</button>
                    <button class="btn btn-number" data-number="2">2</button>
                    <button class="btn btn-number" data-number="3">3</button>
                    <button class="btn btn-operator" data-operator="×" data-action="append">×</button>
                    <button class="btn btn-action" data-action="m-plus">M+</button>

                    <button class="btn btn-number" data-number="0">0</button>
                    <button class="btn btn-number" data-number=".">.</button>
                    <button class="btn btn-action" data-action="sign">±</button>
                    <button class="btn btn-operator" data-operator="÷" data-action="append">÷</button>
                    <button class="btn btn-action" data-action="m-minus">M-</button>

                    <button class="btn btn-action" data-action="clear" style="font-size: 1.2rem;">AC</button>
                    <button class="btn btn-equal" data-action="calculate" style="grid-column: span 3;">=</button>
                    <button class="btn btn-action" data-action="mr">MR</button>
                </div>
                </div>
            </div> <!-- End Standard View -->
        </div>
    </div>
    <script src="../js/math.js"></script>
</body>
</html>
