<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Loan Calculator</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="calculator-wrapper">
        <div class="calculator" style="width: 100%; max-width: 420px;">
            <div class="calc-view active">
                <div class="calc-header">
                    <h2>Auto Loan Calculator</h2>
                    <p>Calculate your monthly car payments</p>
                </div>
                
                <div class="form-box">
                    <div class="input-group">
                        <label>Auto Price ($)</label>
                        <input type="number" id="auto-price" class="custom-input" placeholder="25000">
                    </div>
                    <div class="input-group">
                        <label>Down Payment ($)</label>
                        <input type="number" id="auto-down" class="custom-input" placeholder="5000">
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <div class="input-group" style="flex: 1;">
                            <label>Loan Term (Months)</label>
                            <input type="number" id="auto-term" class="custom-input" placeholder="60">
                        </div>
                        <div class="input-group" style="flex: 1;">
                            <label>Interest Rate (%)</label>
                            <input type="number" id="auto-rate" class="custom-input" placeholder="5">
                        </div>
                    </div>

                    <button id="calc-auto-btn" class="action-btn">Calculate</button>
                </div>
                
                <div class="result-container" id="auto-result-container" style="display: none; padding: 15px;">
                    <div class="age-main" style="font-size: 1.2rem; color: var(--text-primary); margin-bottom: 10px;">
                        Monthly Payment: <br><span id="auto-monthly" style="font-size: 2.5rem; color: var(--calc-accent);">$0.00</span>
                    </div>
                    <div class="age-details" id="auto-details" style="text-align: left; padding: 0;">
                        <!-- Results injected here -->
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/script.js"></script>
    <script src="../js/auto-loan.js"></script>
</body>
</html>
