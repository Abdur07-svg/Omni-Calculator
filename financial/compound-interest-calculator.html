<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compound Interest Calculator</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="calculator-wrapper">
        
        
        <div class="calculator">

            <div class="calc-view active">
                <div class="calc-header">
                    <h2>Compound Interest Calculator</h2>
                    <p>Calculate your investment growth over time</p>
                </div>
                
                <div class="form-box">
                    <div class="input-group">
                        <label>Initial Investment ($)</label>
                        <input type="number" id="initial-amount" placeholder="e.g. 5000" class="custom-input">
                    </div>
                    
                    <div class="input-group">
                        <label>Monthly Contribution ($)</label>
                        <input type="number" id="monthly-contribution" placeholder="e.g. 200" class="custom-input">
                    </div>

                    <div class="input-group">
                        <label>Years to Grow</label>
                        <input type="number" id="years-grow" placeholder="e.g. 10" class="custom-input">
                    </div>

                    <div class="input-group">
                        <label>Estimated Interest Rate (%)</label>
                        <input type="number" id="interest-rate" placeholder="e.g. 8.0" class="custom-input" step="0.1">
                    </div>
                    
                    <button id="calc-compound-btn" class="action-btn">Calculate Growth</button>
                </div>
                
                <div class="result-container" id="compound-result-container" style="display: none;">
                    <div class="age-main">
                        $<span id="future-value">0</span> <span style="font-size: 1rem; color: var(--text-secondary); font-weight: normal;">/ future value</span>
                    </div>
                    <div class="age-details" style="margin-top: 15px;">
                        <p>Total Principal: <span id="total-principal">$0</span></p>
                        <p>Total Contributions: <span id="total-contributions">$0</span></p>
                        <p style="border-top: 1px solid var(--calc-border); padding-top: 10px; margin-top: 10px; color: #22c55e;">Total Interest Earned: <span id="total-interest">$0</span></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/compound.js"></script>
</body>
</html>
